# This Compose file is not usable on its own.
# It needs to be used alongside the default compose.yaml file,
# since it overrides the containers defined in the latter
# and injects a new proxy container and adds a new network.
#
# You can run `docker compose -f compose.yaml -f compose-with-keycloak.yaml config`
# to view the effective merged config.
services:
  traefik:
    image: docker.io/traefik
    container_name: traefik
    command: 
          - "--log.level=DEBUG"
          - "--api.insecure=true"
          - "--api.dashboard=true"
          - "--providers.docker=true"
          - "--entrypoints.web.address=:80"
          - "--serversTransport.insecureSkipVerify=true"
    ports:
      - 8080:80
      - 8001:8080
    volumes:
      - /run/user/4211370/docker.sock:/var/run/docker.sock:ro
  rhdh:
    depends_on:
      keycloak:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rhdh.rule=Host(`dev.rhdh-local.com`)"
      - "traefik.http.routers.rhdh.entrypoints=web"
      - "traefik.http.services.rhdh.loadbalancer.server.port=7007"
  keycloak:
    build:
      context: ./configs/keycloak
      dockerfile: dockerfile
    container_name: keycloak
    hostname: example.keycloak.com
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin_pass
      - KC_PROXY=edge
    command: 'start-dev --import-realm'
    volumes:
      - ./configs/keycloak/rhdh-local-realm.json:/opt/keycloak/data/import/rhdh-local-realm.json
      - ./configs/keycloak/rhdh-local-users-0.json:/opt/keycloak/data/import/rhdh-local-users-0.json
    depends_on:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keycloak.rule=Host(`example.keycloak.com`)"
      - "traefik.http.routers.keycloak.entrypoints=web"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080;echo -e 'GET /health/ready HTTP/1.1\r\nhost: http://localhost\r\nConnection: close\r\n\r\n' >&3;if [ $? -eq 0 ]; then echo 'Healthcheck Successful';exit 0;else echo 'Healthcheck Failed';exit 1;fi;"]
